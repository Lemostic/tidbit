name: Build Tauri Tidbit
run-name: Build & Package Tauri App

# 触发规则
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 推送版本标签自动打包并发布Release
  tags:
    - 'v*'

# 多系统并行构建
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # 配置Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 安装前端依赖
      - name: Install frontend deps
        run: npm ci

      # Tauri官方一键构建Action
      - name: Build Tauri Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Tidbit ${{ github.ref_name }}
          releaseBody: "自动构建发布包"
          releaseDraft: false
          prerelease: false

      # 上传产物到Action临时文件
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: target/release/bundle/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri macOS
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Tidbit ${{ github.ref_name }}
          releaseBody: "自动构建发布包"
          releaseDraft: false
          prerelease: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: target/release/bundle/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Linux Tauri系统依赖
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri Linux
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Tidbit ${{ github.ref_name }}
          releaseBody: "自动构建发布包"
          releaseDraft: false
          prerelease: false

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: target/release/bundle/*

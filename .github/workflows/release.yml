name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: 11.10.0
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  windows:
    name: Publish Windows installers
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install pnpm
        run: npm install --global pnpm@%PNPM_VERSION%

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: tidbit ${{ env.RELEASE_TAG }}
          releaseBody: See CHANGELOG.md for release details.
          releaseDraft: true
          prerelease: false
          args: --bundles nsis,msi

      - name: Publish release
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releases = await github.paginate(github.rest.repos.listReleases, {
              ...context.repo,
              per_page: 100,
            });
            const release = releases.find((item) => item.tag_name === process.env.RELEASE_TAG && item.draft);
            if (!release) {
              core.setFailed(`Draft release not found for ${process.env.RELEASE_TAG}`);
              return;
            }
            await github.rest.repos.updateRelease({
              ...context.repo,
              release_id: release.id,
              draft: false,
              make_latest: "true",
            });
